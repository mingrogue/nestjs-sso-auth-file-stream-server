version: '3.8'

services:
  # SSO Auth Service
  sso-auth:
    build:
      context: .
      dockerfile: Dockerfile.sso-auth
    container_name: sso-auth-service
    ports:
      - "3001:3001"
    env_file:
      - .env
    networks:
      - sso-streaming-network
    restart: unless-stopped

  # Streaming Service
  streaming:
    build:
      context: .
      dockerfile: Dockerfile.streaming
    container_name: streaming-service
    ports:
      - "3002:3002"
    env_file:
      - .env
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      - sso-auth
    networks:
      - sso-streaming-network
    restart: unless-stopped

networks:
  sso-streaming-network:
    external: true

volumes:
  uploads-data:
