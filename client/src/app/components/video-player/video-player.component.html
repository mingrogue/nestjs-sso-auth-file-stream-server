<div class="player-container">
  <header class="header">
    <button class="back-btn" (click)="goBack()">
      <svg viewBox="0 0 24 24" width="24" height="24">
        <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
      Back
    </button>
    <h1 *ngIf="fileInfo">{{ fileInfo.originalName }}</h1>
  </header>

  <div class="player-wrapper" *ngIf="!loading && fileInfo">
    <video 
      *ngIf="fileInfo.mimeType.startsWith('video')"
      controls 
      autoplay
      [src]="streamUrl">
      Your browser does not support the video tag.
    </video>
    
    <audio 
      *ngIf="fileInfo.mimeType.startsWith('audio')"
      controls 
      autoplay
      [src]="streamUrl">
      Your browser does not support the audio tag.
    </audio>

    <img 
      *ngIf="fileInfo.mimeType.startsWith('image')"
      [src]="streamUrl"
      alt="Image"
    />

    <div *ngIf="isTextFile" class="text-viewer">
      <div *ngIf="textLoading" class="text-loading">Loading text...</div>
      <pre *ngIf="!textLoading">{{ textContent }}</pre>
    </div>

    <div *ngIf="!fileInfo.mimeType.startsWith('video') 
      && !fileInfo.mimeType.startsWith('audio')
      && !fileInfo.mimeType.startsWith('image')
      && !isTextFile
    " class="download-prompt">
      <p>This file type cannot be streamed.</p>
      <a [href]="streamUrl" download>Download File</a>
    </div>
  </div>

  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>
</div>
